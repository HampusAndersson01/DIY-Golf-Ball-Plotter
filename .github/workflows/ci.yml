name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      WRITE_COVERAGE_DEBUG_ARTIFACTS: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run pytest
        run: pytest -q -m "not slow" --durations=25

      - name: Upload backend debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-debug-artifacts
          if-no-files-found: ignore
          path: |
            artifacts/**
            logs/**
            .pytest_cache/**

  coverage-quality:
    name: Coverage Quality
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    env:
      WRITE_COVERAGE_DEBUG_ARTIFACTS: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run coverage-quality pytest
        run: pytest -q -m "coverage_quality" --durations=25

      - name: Upload backend debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-quality-debug-artifacts
          if-no-files-found: ignore
          path: |
            artifacts/**
            logs/**
            .pytest_cache/**

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-artifacts
          if-no-files-found: ignore
          path: |
            frontend/dist/**
